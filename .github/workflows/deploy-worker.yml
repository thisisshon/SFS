name: Deploy Proofkit Worker

# Auto-deploys the Cloudflare Worker (src/plugins/proofkit/worker) whenever its
# source changes on main. The site/front-end deploys separately via deploy.yml.
# Needs two repo secrets: CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID.
on:
  push:
    branches: [main]
    paths:
      - 'src/plugins/proofkit/worker/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: read

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy Worker with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: src/plugins/proofkit/worker
          command: deploy
