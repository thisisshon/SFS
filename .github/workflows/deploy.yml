name: Deploy site to GitHub Pages

on:
  # Deploy on every push to main
  push:
    branches: [main]
  # Allow manual runs from the Actions tab
  workflow_dispatch:

# Least-privilege permissions the Pages deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight deploy at a time; don't cancel a running production deploy
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      # Installs deps, runs `astro build`, and uploads ./dist as the Pages artifact
      - name: Build with Astro
        uses: withastro/action@v6
        with:
          node-version: 22
        env:
          # Public (non-secret) URL of Proofkit's Cloudflare Worker
          # (Proofkit package: src/plugins/proofkit/, worker in ./worker).
          # Baked into the client build so the overlay + dashboard use the shared
          # store. Consumed via WORKER_URL in proofkit/config.ts. Unused when
          # Proofkit is switched off (PROOFKIT_ENABLED = false).
          PUBLIC_REVIEW_WORKER_URL: https://shriram-review.shonydjjv.workers.dev

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
