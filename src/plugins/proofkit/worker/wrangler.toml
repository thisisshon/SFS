name = "shriram-review"
main = "worker.js"
compatibility_date = "2024-11-01"

[vars]
# The exact origin your live site is served from (CORS lock). For GitHub Pages
# this is typically "https://OWNER.github.io". Use "*" only while testing.
ALLOW_ORIGIN = "https://thisisshon.github.io"

# KV store for comments. Create it once with:
#   wrangler kv namespace create COMMENTS
# then paste the printed id below.
[[kv_namespaces]]
binding = "COMMENTS"
id = "324f355edd5e4c71b29d3e5e7424d9f5"

# Workers AI - generates the developer-ready change prompt for each entry.
[ai]
binding = "AI"

# --- AI change-prompt provider (pluggable, all optional) ---
# Override the Workers AI model:
#   AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
# OR switch to Anthropic (Claude) by setting the secret
#   wrangler secret put ANTHROPIC_API_KEY
# and optionally the model:
#   ANTHROPIC_MODEL = "claude-haiku-4-5-20251001"

# The passcodes are secrets, NOT stored here. Set them once with:
#   wrangler secret put REVIEW_PASS      # Team ID (reviewers)
#   wrangler secret put ADMIN_PASS       # dashboard admin
